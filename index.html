<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Robotic Spider Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="sim-wrap">
      <div id="sim3d" aria-label="3D robotic spider simulation"></div>
    </section>

    <aside class="panel">
      <h1>3D Robotic Spider</h1>
      <p class="sub">More realistic gait with inverse-kinematics-like leg motion.</p>

      <div class="control">
        <label for="speed">Gait Speed <span id="speedVal">1.1</span>x</label>
        <input id="speed" type="range" min="0" max="3.5" step="0.05" value="1.1" />
      </div>

      <div class="control">
        <label for="stride">Stride Length <span id="strideVal">0.65</span></label>
        <input id="stride" type="range" min="0.2" max="1.2" step="0.01" value="0.65" />
      </div>

      <div class="control">
        <label for="lift">Lift Height <span id="liftVal">0.36</span></label>
        <input id="lift" type="range" min="0.05" max="0.8" step="0.01" value="0.36" />
      </div>

      <div class="control">
        <label for="bodyHeight">Body Height <span id="bodyHeightVal">1.05</span></label>
        <input id="bodyHeight" type="range" min="0.6" max="1.6" step="0.01" value="1.05" />
      </div>

      <div class="control">
        <label for="terrain">Terrain Roughness <span id="terrainVal">0.30</span></label>
        <input id="terrain" type="range" min="0" max="1" step="0.01" value="0.30" />
      </div>

      <div class="control">
        <label for="cameraYaw">Camera Orbit <span id="cameraYawVal">35</span>°</label>
        <input id="cameraYaw" type="range" min="-180" max="180" step="1" value="35" />
      </div>

      <div class="control">
        <label for="cameraTilt">Camera Tilt <span id="cameraTiltVal">63</span>°</label>
        <input id="cameraTilt" type="range" min="20" max="88" step="1" value="63" />
      </div>

      <div class="control">
        <label for="cameraZoom">Camera Distance <span id="cameraZoomVal">8.5</span></label>
        <input id="cameraZoom" type="range" min="5" max="14" step="0.1" value="8.5" />
      </div>

      <div class="buttons">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="resetBtn" type="button">Reset</button>
        <button id="randomBtn" type="button">Randomize</button>
      </div>

      <p class="hint">Mouse drag to rotate, wheel to zoom. For top-view realism: set Camera Tilt 75°-88°.</p>
    </aside>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
