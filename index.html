<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robotic Spider Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="sim-wrap">
      <canvas id="simCanvas" width="1100" height="650" aria-label="Robotic spider simulation"></canvas>
    </section>

    <aside class="panel">
      <h1>Robotic Spider</h1>
      <p class="sub">Web-based simulation with live controls.</p>

      <div class="control">
        <label for="speed">Leg Speed <span id="speedVal">1.2</span>x</label>
        <input id="speed" type="range" min="0" max="4" step="0.05" value="1.2" />
      </div>

      <div class="control">
        <label for="stride">Stride Length <span id="strideVal">42</span></label>
        <input id="stride" type="range" min="10" max="90" step="1" value="42" />
      </div>

      <div class="control">
        <label for="lift">Lift Height <span id="liftVal">30</span></label>
        <input id="lift" type="range" min="5" max="70" step="1" value="30" />
      </div>

      <div class="control">
        <label for="legs">Leg Pairs <span id="legsVal">4</span></label>
        <input id="legs" type="range" min="3" max="6" step="1" value="4" />
      </div>

      <div class="control">
        <label for="bodyBob">Body Stabilization <span id="bodyBobVal">0.45</span></label>
        <input id="bodyBob" type="range" min="0" max="1" step="0.01" value="0.45" />
      </div>

      <div class="control">
        <label for="hue">Body Color Hue <span id="hueVal">180</span>°</label>
        <input id="hue" type="range" min="0" max="360" step="1" value="180" />
      </div>

      <div class="buttons">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="resetBtn" type="button">Reset</button>
        <button id="randomBtn" type="button">Randomize</button>
      </div>

      <p class="hint">Tip: Drag sliders while running to tune gait in real-time.</p>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
